<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelVault - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #0d0d0d; color: #f5f5f5; }
        .glass-panel { background: rgba(25, 25, 25, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .card:hover { transform: translateY(-4px); transition: all 0.3s ease; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Login Overlay -->
    <div id="loginOverlay" class="fixed inset-0 z-[100] bg-black bg-opacity-90 flex items-center justify-center p-4">
        <div class="glass-panel p-8 rounded-2xl w-full max-w-sm flex flex-col gap-6">
            <h2 class="text-2xl font-bold text-center text-white">Admin Login</h2>
            <div class="flex flex-col gap-4">
                <input type="password" id="adminPassword" placeholder="Enter Admin Password" class="w-full bg-black border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition-colors">
                <button onclick="login()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-3 rounded-lg font-semibold transition-colors duration-200 w-full shadow-lg shadow-blue-900/20">Login</button>
            </div>
        </div>
    </div>

    <!-- Navbar -->
    <nav class="glass-panel sticky top-0 z-50 p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="grid grid-cols-2 gap-0.5 w-6 h-6 text-blue-500">
                    <div class="bg-current rounded-sm"></div><div class="bg-current rounded-sm opacity-60"></div>
                    <div class="bg-current rounded-sm opacity-60"></div><div class="bg-current rounded-sm"></div>
                </div>
                <h1 class="text-xl font-bold tracking-tight">PixelVault <span class="text-blue-500 font-normal">Admin</span></h1>
            </div>
            <div class="flex gap-4">
                <a href="/" class="text-sm font-medium hover:text-blue-400 transition" target="_blank">View Live Site &nearr;</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl w-full mx-auto p-6 flex flex-col gap-8">
        
        <!-- Stats & Actions -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass-panel p-6 rounded-2xl flex flex-col gap-2">
                <h3 class="text-gray-400 font-medium tracking-wide text-sm">Pending Verification</h3>
                <p class="text-4xl font-bold" id="pendingCount">0</p>
                <button onclick="loadPhotos('false')" class="text-left text-sm text-yellow-400 font-medium hover:text-yellow-300">View Pending &rarr;</button>
            </div>
            <div class="glass-panel p-6 rounded-2xl flex flex-col gap-2">
                <h3 class="text-gray-400 font-medium tracking-wide text-sm">Verified (Live)</h3>
                <p class="text-4xl font-bold" id="verifiedCount">0</p>
                <button onclick="loadPhotos('true')" class="text-left text-sm text-green-400 font-medium hover:text-green-300">View Live &rarr;</button>
            </div>
            
            <div class="glass-panel p-6 rounded-2xl flex flex-col justify-center gap-4">
                <h3 class="text-gray-400 font-medium tracking-wide text-sm">Action: Fetch New Images</h3>
                <div class="flex gap-2">
                    <input type="text" id="fetchQuery" placeholder="e.g. nature, cars" class="w-full bg-black border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
                    <button onclick="fetchNewPhotos()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-medium transition" id="fetchBtn">Fetch</button>
                </div>
            </div>
        </div>

        <!-- Filter Tabs & Category Filter -->
        <div class="flex flex-wrap items-center justify-between gap-4 border-b border-gray-800 pb-2">
            <div class="flex gap-2 overflow-x-auto">
                <button onclick="loadPhotos('false')" id="tab-pending" class="tab-btn px-4 py-2 rounded-lg font-medium text-sm bg-yellow-500/20 text-yellow-500 border border-yellow-500/30">Pending</button>
                <button onclick="loadPhotos('true')" id="tab-verified" class="tab-btn px-4 py-2 rounded-lg font-medium text-sm text-gray-400 hover:bg-gray-800">Verified</button>
                <button onclick="loadPhotos('')" id="tab-all" class="tab-btn px-4 py-2 rounded-lg font-medium text-sm text-gray-400 hover:bg-gray-800">All Database</button>
            </div>
            <div class="flex items-center gap-2">
                <label for="categoryFilter" class="text-sm text-gray-400 font-medium">Category:</label>
                <select id="categoryFilter" onchange="loadPhotos(currentStatus)" class="bg-black border border-gray-700 text-sm text-gray-300 rounded-lg px-3 py-1.5 focus:outline-none focus:border-blue-500 max-w-[200px] cursor-pointer">
                    <option value="">All Categories</option>
                </select>
            </div>
        </div>

        <!-- Bulk Actions -->
        <div class="flex flex-wrap items-center justify-between gap-4 glass-panel p-4 rounded-xl border border-gray-800">
            <div class="flex items-center gap-4">
                <label class="flex items-center gap-2 cursor-pointer text-sm text-gray-300 font-medium">
                    <input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll(this)" class="w-4 h-4 rounded border-gray-600 bg-gray-800 text-blue-500 focus:ring-blue-500 focus:ring-offset-gray-900 cursor-pointer">
                    <span>Select All</span>
                </label>
                <span id="selectedCount" class="text-sm font-semibold text-blue-400 bg-blue-500/10 px-2 py-1 rounded-md">0 selected</span>
            </div>
            
            <div class="flex flex-wrap gap-3 items-center">
                <!-- Change Category -->
                <div class="flex items-center gap-2 bg-black/50 p-1.5 rounded-lg border border-gray-800">
                    <input type="text" id="bulkCategoryInput" placeholder="New category..." class="bg-transparent border-none text-sm text-white px-2 focus:outline-none focus:ring-0 w-32 md:w-auto">
                    <button onclick="applyBulkCategory()" class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-1 rounded text-xs font-semibold uppercase tracking-wider transition-colors">Set</button>
                </div>
                
                <div class="w-px h-6 bg-gray-700 mx-2 hidden sm:block"></div>
                
                <button onclick="applyBulkVerify()" class="bg-green-600 hover:bg-green-500 text-white px-4 py-2 rounded-lg text-sm font-semibold shadow-lg shadow-green-900/20 transition-all flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    Verify
                </button>
                <button onclick="applyBulkDelete()" class="bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded-lg text-sm font-semibold shadow-lg shadow-red-900/20 transition-all flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    Delete
                </button>
            </div>
        </div>

        <!-- Grid -->
        <div id="loading" class="text-center py-12 hidden">
            <div class="inline-block w-8 h-8 border-4 border-gray-600 border-t-blue-500 rounded-full animate-spin"></div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="adminGrid">
            <!-- Cards injected via JS -->
        </div>

    </main>

    <script src="/admin_frontend.js"></script>
</body>
</html>
